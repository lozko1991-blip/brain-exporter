name: 🧠 Brain → XML Export

on:
  schedule:
    - cron: '0 3,9,15,21 * * *'
  workflow_dispatch:
    inputs:
      category_ids:
        description: 'ID категорій через кому (порожньо = з config.json)'
        required: false
        default: ''
      lang:
        description: 'Мова товарів'
        required: true
        default: 'ua'
        type: choice
        options:
          - ua
          - ru

jobs:
  export:
    name: Вигрузка Brain → XML
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Залежності
        run: pip install httpx

      - name: Вигрузка XML
        env:
          BRAIN_LOGIN:    ${{ secrets.BRAIN_LOGIN }}
          BRAIN_PASSWORD: ${{ secrets.BRAIN_PASSWORD }}
          CATEGORY_IDS:   ${{ github.event.inputs.category_ids }}
          LANG:           ${{ github.event.inputs.lang || 'ua' }}
          OUTPUT_FILE:    output/catalog.xml
        run: python export.py

      - name: Зберегти XML в репозиторій
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add output/catalog.xml
          git diff --staged --quiet || git commit -m "Auto-update catalog $(date +'%Y-%m-%d %H:%M')"
          git push

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: brain-catalog-${{ github.run_number }}
          path: output/catalog.xml
          retention-days: 30
