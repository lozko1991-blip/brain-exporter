name: 🧠 Brain → XML Export

on:
  schedule:
    - cron: '0 3,9,15,21 * * 1-6'  # quick: пн-сб о 06:00, 12:00, 18:00, 00:00 Київ
    - cron: '0 3 * * 0'             # full:  неділя о 06:00 Київ

  workflow_dispatch:
    inputs:
      mode:
        description: 'Режим вигрузки'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - quick
      lang:
        description: 'Мова товарів'
        required: true
        default: 'ua'
        type: choice
        options:
          - ua
          - ru

jobs:
  export:
    name: Вигрузка Brain → XML (${{ github.event.inputs.mode || 'quick' }})
    runs-on: ubuntu-latest
    timeout-minutes: 180

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Залежності
        run: pip install httpx

      - name: 🚀 Вигрузка XML
        env:
          BRAIN_LOGIN:    ${{ secrets.BRAIN_LOGIN }}
          BRAIN_PASSWORD: ${{ secrets.BRAIN_PASSWORD }}
          EXPORT_MODE:    ${{ github.event.inputs.mode || 'quick' }}
          LANG:           ${{ github.event.inputs.lang || 'ua' }}
          SHOP_NAME:      "AVi"
          SHOP_URL:       "https://avi.com.ua"
        run: python export.py

      - name: 💾 Зберегти в репозиторій
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          # Спочатку pull щоб синхронізуватись з remote
          # fetch + reset замість rebase — надійніше
          git fetch origin main
          git reset --soft origin/main
          # Тепер додаємо наші файли
          git add output/catalog.xml || true
          git add categories.json || true
          git add products_cache.json || true
          # Комітимо якщо є зміни
          git diff --staged --quiet || git commit -m "🔄 Auto-update [$(date +'%Y-%m-%d %H:%M')] mode=${{ github.event.inputs.mode || 'quick' }}"
          git push origin main

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: brain-catalog-${{ github.run_number }}
          path: output/catalog.xml
          retention-days: 30
